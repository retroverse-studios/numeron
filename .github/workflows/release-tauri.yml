name: Release Tauri App

# Builds Tauri desktop installers when a v* tag is pushed and attaches them to
# a draft GitHub release (same pattern as ASTRON). macOS bundles are signed
# with a Developer ID certificate and notarized by Apple during bundling
# (Windows/Linux remain unsigned).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux webview dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - run: pnpm install --frozen-lockfile
      # Build the tauri app's workspace dependencies that need compiling.
      # (@numeron/pdf ships TypeScript source directly, so only core needs a
      # build. Keep this list in sync with apps/tauri/package.json deps; the
      # "numeron-tauri^..." dependency filter mis-selects the app itself on
      # Windows runners, so packages are listed explicitly.)
      - run: pnpm --filter @numeron/core build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (presence of these triggers signing in the
          # Tauri bundler) and notarization (Apple ID + app-specific password).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/tauri
          tagName: ${{ github.ref_name }}
          releaseName: "NUMERON ${{ github.ref_name }}"
          releaseDraft: true
          args: ${{ matrix.args }}
