appId: com.retroversestudios.numeron
productName: NUMERON
copyright: Copyright © 2026 Retroverse Studios

directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - dist-renderer/**/*

# Auto-updater — uses GitHub Releases
publish:
  provider: github
  owner: retroverse-studios
  repo: numeron
  releaseType: release

# Windows
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: NUMERON-${version}-win-setup.${ext}

# macOS
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.png
  category: public.app-category.utilities
  artifactName: NUMERON-${version}-mac-${arch}.${ext}

dmg:
  artifactName: NUMERON-${version}-mac-${arch}.${ext}

# Linux
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: resources/icon.png
  category: Utility
  artifactName: NUMERON-${version}-linux.${ext}

# Auto-update — electron-updater reads this to find releases
# The `latest.yml` / `latest-mac.yml` / `latest-linux.yml` files
# are auto-generated by electron-builder and uploaded alongside
# the release assets. electron-updater checks these files to
# determine if a newer version is available.
